<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search for movies and TV shows to add to your personal watchlist.">
    <title>Metflix - Find Your Next Watch</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">Metflix</a>
            <nav>
                <a href="index.html" class="active">Search</a>
                <a href="library.html">My Library</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-background"></div>
            <div class="hero-overlay"></div>
            <div class="hero-content container">
                <h1>Unlimited movies, TV shows, and more.</h1>
                <p>Search for any title to get started.</p>
                <form id="search-form">
                    <label for="search-input" class="sr-only">Search for a title</label>
                    <input type="text" id="search-input" placeholder="Search for a title..." autocomplete="off">
                    <button type="submit">
                        <span>Search</span>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </form>
            </div>
        </section>

        <section id="results-section" class="movie-rows-container">
            <!-- Movie rows will be populated here by JavaScript -->
        </section>
    </main>

    <div id="details-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-content">
            <h2 id="modal-title" class="sr-only">Movie Details</h2>
            <!-- Modal content will be populated here by JavaScript -->
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
